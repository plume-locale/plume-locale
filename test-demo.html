        .log { margin: 5px 0; padding: 5px; border-left: 3px solid #4CAF50; }
        .error { border-left-color: #f44336; color: #ff6b6b; }

    <h1>🧪 Test de Chargement des Modules</h1>
    <div id="logs"></div>

    <script>
        const logs = document.getElementById('logs');

        function log(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.appendChild(div);
            console.log(message);
        }

        window.onerror = function(msg, url, line, col, error) {
            log(`❌ ERROR: ${msg} at ${url}:${line}:${col}`, 'error');
            return false;
        };

        log('Début du test de chargement...', 'info');
    </script>
